<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuzaxy - B2B Marketplace</title>
    
    <!-- Open Graph / WhatsApp Link Preview Tags -->
    <meta property="og:title" content="Yuzaxy - B2B Marketplace">
    <meta property="og:description" content="Wholesale Pharmaceutical & Medical Products">
    <meta property="og:image" content="https://yuzaxy-prototype.vercel.app/assets/images/PHOTO-2026-06-12-19-59-03.jpg">
    <meta property="og:url" content="https://yuzaxy-prototype.vercel.app/">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="../assets/images/PHOTO-2026-06-12-19-59-03.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="b2b-header">
        <div class="header-container">
            <div class="logo-container">
                <img src="../assets/images/PHOTO-2026-06-12-19-59-03.jpg" alt="Yuzaxy Logo" class="logo">
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search products, categories...">
                <button id="search-btn" class="search-btn">Search</button>
            </div>

            <div class="header-actions">
                <!-- Buttons removed -->
            </div>
        </div>
    </header>

    <main class="marketplace-container" id="catalog-view">
        <aside class="sidebar">
            <h3 class="sidebar-title">Categories</h3>
            <ul class="category-list" id="category-list">
                <!-- Categories injected via JS -->
            </ul>
            <select class="category-select" id="category-select" onchange="setCategory(this.value)">
                <!-- Options injected via JS -->
            </select>
        </aside>

        <section class="main-content">
            <div class="content-header">
                <h2 id="current-category-title">All Products</h2>
                <span class="product-count" id="product-count">0 items found</span>
            </div>
            
            <div class="product-grid" id="product-grid">
                <!-- Products injected via JS -->
            </div>
        </section>
    </main>

    <!-- Product Detail View -->
    <main class="product-detail-container hidden" id="detail-view">
        <div class="detail-header">
            <button class="back-btn" onclick="showCatalog()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Back to Catalog
            </button>
        </div>
        <div class="detail-content" id="detail-content-area">
            <!-- Details injected via JS -->
        </div>
    </main>

    <!-- Contact Card Section -->
    <section class="contact-card-section">
        <div class="contact-card">
            <div class="contact-header">
                <h2>Contact Yuzaxy Pharma</h2>
                <p>Your Trusted Wholesaler & Distributor</p>
            </div>
            <div class="contact-details">
                <div class="contact-item">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    </div>
                    <div>
                        <h4>Location</h4>
                        <span>Kozhikode, Kerala, India</span>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    </div>
                    <div>
                        <h4>Phone</h4>
                        <span>+91 98461 96746</span>
                    </div>
                </div>
            </div>
            <div class="contact-action">
                <a href="https://wa.me/919846196746" target="_blank" class="whatsapp-btn large-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    Direct WhatsApp Chat
                </a>
            </div>
        </div>
    </section>

    <footer class="b2b-footer">
        <p>&copy; 2026 Yuzaxy B2B Network. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
