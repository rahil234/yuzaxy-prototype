<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuzaxy - B2B Marketplace</title>
    
    <!-- Open Graph / WhatsApp Link Preview Tags -->
    <meta property="og:title" content="Yuzaxy - B2B Marketplace">
    <meta property="og:description" content="Wholesale Pharmaceutical & Medical Products">
    <meta property="og:image" content="https://yuzaxy-prototype.vercel.app/assets/images/PHOTO-2026-06-12-19-59-03.jpg">
    <meta property="og:url" content="https://yuzaxy-prototype.vercel.app/">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="../assets/images/PHOTO-2026-06-12-19-59-03.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="b2b-header">
        <div class="header-container">
            <div class="logo-container">
                <img src="../assets/images/PHOTO-2026-06-12-19-59-03.jpg" alt="Yuzaxy Logo" class="logo">
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search products, categories...">
                <button id="search-btn" class="search-btn">Search</button>
            </div>

            <div class="header-actions">
                <a href="#" class="header-link">Get Quotes</a>

            </div>
        </div>
    </header>

    <main class="marketplace-container">
        <aside class="sidebar">
            <h3 class="sidebar-title">Categories</h3>
            <ul class="category-list" id="category-list">
                <!-- Categories injected via JS -->
            </ul>
        </aside>

        <section class="main-content">
            <div class="content-header">
                <h2 id="current-category-title">All Products</h2>
                <span class="product-count" id="product-count">0 items found</span>
            </div>
            
            <div class="product-grid" id="product-grid">
                <!-- Products injected via JS -->
            </div>
        </section>
    </main>

    <footer class="b2b-footer">
        <p>&copy; 2026 Yuzaxy B2B Network. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
